version: 0.2

phases:
  pre_build:
    commands:
      - echo "Starting deployment build..."
      - aws --version
      - python3 --version
      - echo "Build environment ready"
  
  build:
    commands:
      - echo "Building and deploying application..."
      - |
        # Get production instance info
        PROD_INSTANCE=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=RecogBackendStack/RecogProdHost" "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].InstanceId' --output text)
        
        if [ "$PROD_INSTANCE" = "None" ] || [ -z "$PROD_INSTANCE" ]; then
          echo "❌ No production instance found!"
          exit 1
        fi
        
        echo "✅ Found production instance: $PROD_INSTANCE"
        
        # Copy deploy.sh to production instance using SSM
        echo "Copying deployment script to production instance..."
        
        # Read the deploy.sh file content
        DEPLOY_SCRIPT_CONTENT=$(cat deployment-toolkit/deploy.sh)
        
        # Send the script to production instance
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids $PROD_INSTANCE \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[\"#!/bin/bash\", \"set -e\", \"cat > /tmp/deploy.sh << 'DEPLOY_EOF'\", \"$DEPLOY_SCRIPT_CONTENT\", \"DEPLOY_EOF\", \"chmod +x /tmp/deploy.sh\", \"/tmp/deploy.sh\"]" \
          --query 'Command.CommandId' --output text)
        
        echo "Deployment command sent: $COMMAND_ID"
        
        # Wait for deployment to complete
        echo "Waiting for deployment to complete..."
        while true; do
          sleep 10
          STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $PROD_INSTANCE \
            --query 'Status' --output text)
          
          echo "Current status: $STATUS"
          
          if [ "$STATUS" = "Success" ]; then
            echo "✅ Deployment successful!"
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "❌ Deployment failed with status: $STATUS"
            aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id $PROD_INSTANCE --query 'StandardErrorContent' --output text
            exit 1
          fi
        done

artifacts:
  files:
    - deploy-output.json
  discard-paths: no
