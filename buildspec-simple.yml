version: 0.2

phases:
  pre_build:
    commands:
      - echo "Starting simplified deployment to production EC2..."
      - aws --version
      - python3 --version
      - echo "Build environment ready"
  
  build:
    commands:
      - echo "Deploying to production instance..."
      - |
        # Configuration from CDK environment variables
        PROD_INSTANCE_ID="$PROD_INSTANCE_ID"
        SERVICE_NAME="matsight-backend"
        PORT="8000"
        ARTIFACT_BUCKET="$ARTIFACT_BUCKET"
        
        echo "Target instance: $PROD_INSTANCE_ID"
        echo "Service name: $SERVICE_NAME"
        echo "Port: $PORT"
        echo "Artifact bucket: $ARTIFACT_BUCKET"
        
        # Check if instance is running
        INSTANCE_STATUS=$(aws ec2 describe-instances \
          --instance-ids $PROD_INSTANCE_ID \
          --query 'Reservations[0].Instances[0].State.Name' --output text)
        
        if [ "$INSTANCE_STATUS" != "running" ]; then
          echo "Instance $PROD_INSTANCE_ID is not running (status: $INSTANCE_STATUS)"
          exit 1
        fi
        
        echo "Instance is running"
        
        # Create a simple deployment script
        cat > /tmp/simple-deploy.sh << 'DEPLOY_EOF'
#!/bin/bash
set -e

echo "Starting simple deployment..."

# Configuration
SERVICE_NAME="matsight-backend"
PORT="8000"

echo "Config: SERVICE_NAME=$SERVICE_NAME, PORT=$PORT"

# Install basic packages
echo "Installing packages..."
sudo yum update -y
sudo yum install -y python3 python3-pip git

# Create app directory
sudo mkdir -p /opt/matsight
sudo chown ec2-user:ec2-user /opt/matsight
cd /opt/matsight

# Stop existing service
sudo systemctl stop $SERVICE_NAME || true
sudo systemctl disable $SERVICE_NAME || true

# Copy source code
echo "Copying source code..."
sudo cp -r /tmp/source/* /opt/matsight/
sudo chown -R ec2-user:ec2-user /opt/matsight

# Setup Python environment
cd /opt/matsight
python3 -m venv venv
source venv/bin/activate

# Install dependencies
if [ -f "requirements.txt" ]; then
  echo "Installing Python dependencies..."
  pip install -r requirements.txt
else
  echo "Installing basic Flask..."
  pip install Flask==2.3.3 Werkzeug==2.3.7
fi

# Create systemd service
echo "Creating systemd service..."
sudo tee /etc/systemd/system/$SERVICE_NAME.service > /dev/null << SERVICE_EOF
[Unit]
Description=$SERVICE_NAME
After=network.target

[Service]
Type=simple
User=ec2-user
WorkingDirectory=/opt/matsight
Environment=PATH=/opt/matsight/venv/bin
ExecStart=/opt/matsight/venv/bin/python app.py
Restart=always
RestartSec=10

[Install]
WantedBy=multi-user.target
SERVICE_EOF

# Start service
echo "Starting service..."
sudo systemctl daemon-reload
sudo systemctl enable $SERVICE_NAME
sudo systemctl start $SERVICE_NAME

# Check service status
echo "Checking service status..."
sudo systemctl status $SERVICE_NAME --no-pager || true

# Simple health check
echo "Performing health check..."
sleep 5
if curl -fsS http://127.0.0.1:$PORT/health > /dev/null 2>&1 || curl -fsS http://127.0.0.1:$PORT/ > /dev/null 2>&1; then
  echo "Health check passed!"
else
  echo "Health check failed"
  sudo systemctl status $SERVICE_NAME --no-pager
  exit 1
fi

echo "Simple deployment completed successfully"
DEPLOY_EOF
        
        # Upload deployment script to S3
        echo "Uploading deployment script to S3..."
        aws s3 cp /tmp/simple-deploy.sh s3://$ARTIFACT_BUCKET/simple-deploy.sh
        
        # Execute deployment via SSM
        echo "Executing deployment via SSM..."
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids $PROD_INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":["aws s3 cp s3://'"$ARTIFACT_BUCKET"'/simple-deploy.sh /tmp/simple-deploy.sh", "chmod +x /tmp/simple-deploy.sh", "/tmp/simple-deploy.sh"]}' \
          --timeout-seconds 600 \
          --query 'Command.CommandId' --output text)
        
        echo "Deployment command sent: $COMMAND_ID"
        
        # Wait for deployment to complete
        echo "Waiting for deployment to complete..."
        while true; do
          sleep 10
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$PROD_INSTANCE_ID" \
            --query 'Status' --output text)
          
          echo "Deployment status: $STATUS"
          
          if [ "$STATUS" = "Success" ]; then
            echo "Deployment successful!"
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "Deployment failed with status: $STATUS"
            echo "Error output:"
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$PROD_INSTANCE_ID" --query 'StandardErrorContent' --output text
            exit 1
          fi
        done

  post_build:
    commands:
      - echo "Simple deployment completed successfully!"

artifacts:
  files:
    - deploy-output.json
  discard-paths: no
