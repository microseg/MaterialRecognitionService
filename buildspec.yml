version: 0.2

phases:
  pre_build:
    commands:
      - echo "Starting deployment build..."
      - aws --version
      - python3 --version
      - echo "Build environment ready"
  
  build:
    commands:
      - echo "Building and deploying application..."
      - |
        # Get production instance info
        PROD_INSTANCE=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=RecogBackendStack/RecogProdHost" "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].InstanceId' --output text)
        
        if [ "$PROD_INSTANCE" = "None" ] || [ -z "$PROD_INSTANCE" ]; then
          echo "❌ No production instance found!"
          exit 1
        fi
        
        echo "✅ Found production instance: $PROD_INSTANCE"
        
        # Configuration (can be overridden by environment variables)
        SERVICE_NAME=${SERVICE_NAME:-matsight-backend}
        APP_DIR=${APP_DIR:-.}
        REQUIREMENTS_FILE=${REQUIREMENTS_FILE:-requirements.txt}
        PORT=${PORT:-8000}
        HEALTH_PATH=${HEALTH_PATH:-/health}
        INSTALL_SYSTEM_PACKAGES=${INSTALL_SYSTEM_PACKAGES:-true}
        START_CMD=${START_CMD:-}
        
        echo "Config: SERVICE_NAME=$SERVICE_NAME, PORT=$PORT, APP_DIR=$APP_DIR"
        
        # Create deployment script content
        DEPLOY_SCRIPT=$(cat << 'DEPLOY_EOF'
        #!/bin/bash
        set -e
        
        echo "Starting deployment..."
        
        # Configuration (can be overridden by environment variables)
        SERVICE_NAME=${SERVICE_NAME:-matsight-backend}
        APP_DIR=${APP_DIR:-.}
        REQUIREMENTS_FILE=${REQUIREMENTS_FILE:-requirements.txt}
        PORT=${PORT:-8000}
        HEALTH_PATH=${HEALTH_PATH:-/health}
        INSTALL_SYSTEM_PACKAGES=${INSTALL_SYSTEM_PACKAGES:-true}
        START_CMD=${START_CMD:-}
        
        echo "Config: SERVICE_NAME=$SERVICE_NAME, PORT=$PORT, APP_DIR=$APP_DIR"
        
        # Install system packages if needed
        if [ "$INSTALL_SYSTEM_PACKAGES" = "true" ]; then
          echo "Installing system packages..."
          sudo yum update -y
          sudo yum install -y git python3 python3-pip python3-devel gcc make rsync curl
        fi
        
        # Prepare directories
        sudo mkdir -p /opt/matsight
        sudo chown ec2-user:ec2-user /opt/matsight
        sudo mkdir -p /opt/matsight/current
        sudo chown ec2-user:ec2-user /opt/matsight/current
        
        # Stop existing service
        sudo systemctl stop $SERVICE_NAME || true
        
        # Backup existing deployment
        if [ -d "/opt/matsight/current" ] && [ "$(ls -A /opt/matsight/current 2>/dev/null)" ]; then
          sudo mkdir -p /opt/matsight/backup
          sudo mv /opt/matsight/current /opt/matsight/backup/$(date +%Y%m%d-%H%M%S)
          sudo mkdir -p /opt/matsight/current
          sudo chown ec2-user:ec2-user /opt/matsight/current
        fi
        
        # Copy source code
        SRC=${CODEBUILD_SRC_DIR:-/tmp/source}
        if [ "$APP_DIR" != "." ]; then
          SRC="$SRC/$APP_DIR"
        fi
        echo "Copying from: $SRC"
        ls -la "$SRC" || true
        sudo rsync -a --delete "$SRC"/ /opt/matsight/current/
        sudo chown -R ec2-user:ec2-user /opt/matsight/current
        
        # Setup Python environment
        cd /opt/matsight/current
        python3 -m venv venv
        source venv/bin/activate
        
        # Install dependencies
        if [ -f "$REQUIREMENTS_FILE" ]; then
          echo "Installing Python dependencies..."
          pip install -r $REQUIREMENTS_FILE
        fi
        
        # Auto-detect start command if not provided
        if [ -z "$START_CMD" ]; then
          echo "Auto-detecting start command..."
          if [ -f requirements.txt ] && grep -qiE "^gunicorn(==|\s|$)" requirements.txt; then
            START_CMD="gunicorn -b 0.0.0.0:$PORT app:app"
            echo "Detected gunicorn"
          elif [ -f requirements.txt ] && grep -qiE "^uvicorn(==|\s|$)" requirements.txt; then
            START_CMD="uvicorn app:app --host 0.0.0.0 --port $PORT"
            echo "Detected uvicorn"
          elif [ -f app.py ]; then
            START_CMD="/opt/matsight/current/venv/bin/python app.py"
            echo "Detected app.py"
          elif [ -f main.py ]; then
            START_CMD="/opt/matsight/current/venv/bin/python main.py"
            echo "Detected main.py"
          else
            echo "No recognizable entry point found. Creating minimal Flask app..."
            cat > app.py << 'FLASK_EOF'
        from flask import Flask, jsonify
        import datetime
        
        app = Flask(__name__)
        
        @app.route('/')
        def home():
            return jsonify({'message': 'OK', 'timestamp': datetime.datetime.now().isoformat()})
        
        @app.route('/health')
        def health():
            return jsonify({'status': 'healthy', 'timestamp': datetime.datetime.now().isoformat()})
        
        if __name__ == '__main__':
            app.run(host='0.0.0.0', port=8000, debug=False)
        FLASK_EOF
            pip install Flask==2.3.3 Werkzeug==2.3.7
            START_CMD="/opt/matsight/current/venv/bin/python app.py"
          fi
        fi
        
        echo "Using start command: $START_CMD"
        
        # Create systemd service
        sudo tee /etc/systemd/system/$SERVICE_NAME.service > /dev/null << EOF
        [Unit]
        Description=$SERVICE_NAME
        After=network.target
        
        [Service]
        Type=simple
        User=ec2-user
        WorkingDirectory=/opt/matsight/current
        Environment=PATH=/opt/matsight/current/venv/bin
        ExecStart=/bin/bash -lc "$START_CMD"
        Restart=always
        RestartSec=10
        
        [Install]
        WantedBy=multi-user.target
        EOF
        
        # Start service
        sudo systemctl daemon-reload
        sudo systemctl enable $SERVICE_NAME
        sudo systemctl start $SERVICE_NAME
        
        # Check service status
        sudo systemctl status $SERVICE_NAME --no-pager || true
        
        # Health check
        echo "Performing health check..."
        sleep 5
        curl -fsS http://127.0.0.1:$PORT$HEALTH_PATH || curl -fsS http://127.0.0.1:$PORT/ || true
        
        echo "Deployment completed successfully"
        DEPLOY_EOF
        )
        
        # Send deployment script to production instance
        echo "Sending deployment script to production instance..."
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids $PROD_INSTANCE \
          --document-name "AWS-RunShellScript" \
          --parameters "commands=[\"#!/bin/bash\", \"set -e\", \"cat > /tmp/deploy.sh << 'DEPLOY_EOF'\", \"$DEPLOY_SCRIPT\", \"DEPLOY_EOF\", \"chmod +x /tmp/deploy.sh\", \"/tmp/deploy.sh\"]" \
          --query 'Command.CommandId' --output text)
        
        echo "Deployment command sent: $COMMAND_ID"
        
        # Wait for deployment to complete
        echo "Waiting for deployment to complete..."
        while true; do
          sleep 10
          STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $PROD_INSTANCE \
            --query 'Status' --output text)
          
          echo "Current status: $STATUS"
          
          if [ "$STATUS" = "Success" ]; then
            echo "✅ Deployment successful!"
            break
          elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
            echo "❌ Deployment failed with status: $STATUS"
            aws ssm get-command-invocation --command-id $COMMAND_ID --instance-id $PROD_INSTANCE --query 'StandardErrorContent' --output text
            exit 1
          fi
        done

artifacts:
  files:
    - deploy-output.json
  discard-paths: no
